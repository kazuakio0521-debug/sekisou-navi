<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEKISOU NAVI - Pro Edition</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent: #f97316;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --lv1: #22c55e; --lv2: #eab308; --lv3: #f97316; --lv4: #ef4444; --lv5: #a855f7;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-main); padding: 15px; display: flex; justify-content: center; }
        .card { max-width: 480px; width: 100%; background: var(--card-bg); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); }
        h1 { color: var(--accent); text-align: center; font-size: 1.5rem; letter-spacing: 3px; text-shadow: 0 0 15px rgba(249, 115, 22, 0.5); margin-bottom: 20px; }
        
        .section-label { color: var(--accent); font-size: 0.7rem; text-transform: uppercase; margin-bottom: 8px; display: block; opacity: 0.8; }
        select, input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: white; margin-bottom: 12px; box-sizing: border-box; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .input-group label { display: block; font-size: 0.8rem; color: var(--text-sub); margin-bottom: 4px; }
        
        button { width: 100%; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        .btn-calc { background: linear-gradient(135deg, #fb923c, #f97316); color: white; margin-top: 15px; font-size: 1rem; }
        .btn-save { background: transparent; border: 1px solid #334155; color: var(--text-sub); font-size: 0.8rem; margin-top: 10px; }
        .btn-delete { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; font-size: 0.75rem; padding: 8px; margin-bottom: 15px; display: none; }

        .result-box { margin-top: 25px; border-radius: 15px; overflow: hidden; display: none; border: 1px solid #334155; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .level-header { padding: 12px; text-align: center; font-weight: 900; font-size: 1.3rem; letter-spacing: 1px; }
        .advice-body { padding: 18px; background: rgba(0,0,0,0.3); }
        
        .ceq-info { text-align: center; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .ceq-val { font-size: 2.2rem; font-weight: 800; color: var(--text-main); }

        .item { margin-bottom: 12px; }
        .item-t { font-size: 0.7rem; color: var(--accent); font-weight: bold; margin-bottom: 2px; }
        .item-v { font-size: 0.9rem; line-height: 1.4; color: #e2e8f0; }
    </style>
</head>
<body>

<div class="card">
    <h1>SEKISOU NAVI</h1>
    
    <span class="section-label">Material Database</span>
    <select id="materialSelect" onchange="loadMaterial()"></select>
    <button id="delBtn" class="btn-delete" onclick="deleteMaterial()">✕ DELETE THIS MATERIAL</button>

    <div id="newNameArea" style="display:none;">
        <input type="text" id="newName" placeholder="Enter new material name...">
    </div>

    <span class="section-label">Mill Test Report (%)</span>
    <div class="grid">
        <div class="input-group"><label>C (炭素)</label><input type="number" id="C" step="0.01"></div>
        <div class="input-group"><label>Cr (クロム)</label><input type="number" id="Cr" step="0.01"></div>
        <div class="input-group"><label>Mn (マンガン)</label><input type="number" id="Mn" step="0.01"></div>
        <div class="input-group"><label>Mo (モリブデン)</label><input type="number" id="Mo" step="0.01"></div>
        <div class="input-group"><label>Si (ケイ素)</label><input type="number" id="Si" step="0.01"></div>
        <div class="input-group"><label>V (バナジウム)</label><input type="number" id="V" step="0.01"></div>
    </div>
    
    <button class="btn-save" onclick="saveMaterial()">SAVE TO DATABASE</button>
    <button class="btn-calc" onclick="calculate()">ANALYSIS START</button>

    <div id="result" class="result-box">
        <div id="lvHeader" class="level-header">LEVEL --</div>
        <div class="advice-body">
            <div class="ceq-info">
                <div style="font-size: 0.75rem; color: var(--text-sub);">Carbon Equivalent (Ceq)</div>
                <div id="ceqVal" class="ceq-val">0.00</div>
            </div>
            <div class="item"><div class="item-t">🌡️ PREHEAT (予熱)</div><div id="pre" class="item-v"></div></div>
            <div class="item"><div class="item-t">🔥 POST-HEAT (後熱)</div><div id="post" class="item-v"></div></div>
            <div class="item"><div class="item-t">❄️ COOLING (冷却速度 / 炉冷)</div><div id="cool" class="item-v"></div></div>
        </div>
    </div>
</div>

<script>
    // ... JavaScript の中身はタイトル以外同じだけど、最新版として統一 ...
    const defaultData = {
        skd11: { name: "SKD11 (Standard)", c: 1.5, cr: 12.0, mn: 0.4, mo: 1.0, si: 0.3, v: 0.3 },
        skd61: { name: "SKD61 (Standard)", c: 0.4, cr: 5.0, mn: 0.4, mo: 1.2, si: 1.0, v: 1.0 }
    };
    let materials = JSON.parse(localStorage.getItem('myMaterials')) || defaultData;

    function init() {
        const select = document.getElementById('materialSelect');
        select.innerHTML = '';
        for (let key in materials) {
            let opt = document.createElement('option');
            opt.value = key; opt.innerText = materials[key].name;
            select.appendChild(opt);
        }
        let optNew = document.createElement('option');
        optNew.value = 'new'; optNew.innerText = '＋ Create New Material';
        select.appendChild(optNew);
        loadMaterial();
    }

    function loadMaterial() {
        const sel = document.getElementById('materialSelect').value;
        const area = document.getElementById('newNameArea');
        const delBtn = document.getElementById('delBtn');
        if (sel === 'new') {
            area.style.display = 'block'; delBtn.style.display = 'none';
            ['C','Cr','Mn','Mo','Si','V'].forEach(id => document.getElementById(id).value = '');
        } else {
            area.style.display = 'none';
            delBtn.style.display = sel.startsWith('user_') ? 'block' : 'none';
            const d = materials[sel];
            document.getElementById('C').value = d.c; document.getElementById('Cr').value = d.cr;
            document.getElementById('Mn').value = d.mn; document.getElementById('Mo').value = d.mo;
            document.getElementById('Si').value = d.si; document.getElementById('V').value = d.v;
        }
    }

    function saveMaterial() {
        const sel = document.getElementById('materialSelect').value;
        let name, key;
        if (sel === 'new') {
            name = document.getElementById('newName').value || prompt("材質名を入力してください");
            if (!name) return; key = 'user_' + Date.now();
        } else {
            name = materials[sel].name; key = sel;
            if(!confirm(name + " を更新してもよろしいですか？")) return;
        }
        materials[key] = {
            name: name,
            c: parseFloat(document.getElementById('C').value)||0, cr: parseFloat(document.getElementById('Cr').value)||0,
            mn: parseFloat(document.getElementById('Mn').value)||0, mo: parseFloat(document.getElementById('Mo').value)||0,
            si: parseFloat(document.getElementById('Si').value)||0, v: parseFloat(document.getElementById('V').value)||0
        };
        localStorage.setItem('myMaterials', JSON.stringify(materials));
        init(); document.getElementById('materialSelect').value = key; loadMaterial(); alert("データベースを更新しました。");
    }

    function deleteMaterial() {
        const sel = document.getElementById('materialSelect').value;
        if (confirm("この材質データを完全に削除しますか？")) {
            delete materials[sel]; localStorage.setItem('myMaterials', JSON.stringify(materials)); init();
        }
    }

    function calculate() {
        const c = parseFloat(document.getElementById('C').value)||0, cr = parseFloat(document.getElementById('Cr').value)||0,
              mn = parseFloat(document.getElementById('Mn').value)||0, mo = parseFloat(document.getElementById('Mo').value)||0,
              si = parseFloat(document.getElementById('Si').value)||0, v = parseFloat(document.getElementById('V').value)||0;

        const ceq = c + (mn/6) + (si/24) + (cr/5) + (mo/4) + (v/14);
        document.getElementById('ceqVal').innerText = ceq.toFixed(2);
        
        let lv, color, pre, post, cool;
        if (ceq >= 1.2) {
            lv = "LEVEL 5 (CRITICAL)"; color = "var(--lv5)";
            pre = "250℃以上 (予熱必須)"; post = "250℃/1時間保持。絶対に急冷厳禁。"; cool = "炉冷必須。5℃/10分以下のペースで。";
        } else if (ceq >= 0.8) {
            lv = "LEVEL 4 (DANGER)"; color = "var(--lv4)";
            pre = "200℃ - 250℃"; post = "200℃/30分保持後、徐冷開始。"; cool = "10℃/10分以下の徐冷を維持。";
        } else if (ceq >= 0.6) {
            lv = "LEVEL 3 (WARNING)"; color = "var(--lv3)";
            pre = "150℃ - 200℃"; post = "積層直後に保温カバー等で保護。"; cool = "20℃/10分程度のペースで。";
        } else if (ceq >= 0.4) {
            lv = "LEVEL 2 (CAUTION)"; color = "var(--lv2)";
            pre = "100℃前後"; post = "放冷前に少し熱を残すイメージ。"; cool = "扇風機等は使わず自然に。";
        } else {
            lv = "LEVEL 1 (SAFE)"; color = "var(--lv1)";
            pre = "30℃〜常温"; post = "特になし"; cool = "自然放冷でOK";
        }

        const head = document.getElementById('lvHeader');
        head.innerText = lv; head.style.backgroundColor = color;
        document.getElementById('pre').innerText = pre;
        document.getElementById('post').innerText = post;
        document.getElementById('cool').innerText = cool;
        document.getElementById('result').style.display = 'block';
    }
    init();
</script>
</body>
</html>
