<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEKISOU NAVI PRO v2.3 [MASTER DATABASE]</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* デザインは前回のサイバー・タクティカルを維持 */
        :root { --primary: #00f2fe; --primary-dark: #00a8b5; --bg: #0a0e17; --card-bg: rgba(20, 30, 48, 0.8); --text: #e0f7fa; --input-bg: rgba(0, 0, 0, 0.3); --border: #1a2a44; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg); background-image: radial-gradient(#1a2a44 1px, transparent 1px); background-size: 20px 20px; color: var(--text); padding: 20px; display: flex; justify-content: center; margin: 0; min-height: 100vh; }
        .card { max-width: 480px; width: 100%; background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 0 20px rgba(0, 242, 254, 0.15); border: 1px solid var(--border); backdrop-filter: blur(10px); }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--primary); text-align: center; font-size: 1.8rem; letter-spacing: 3px; text-shadow: 0 0 15px rgba(0, 242, 254, 0.6); margin-top: 0; margin-bottom: 30px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; display: inline-block; width: 100%; }
        .section-title { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; color: var(--primary); font-weight: bold; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; display: flex; align-items: center; }
        .section-title::before { content: ''; display: inline-block; width: 10px; height: 10px; background: var(--primary); margin-right: 10px; box-shadow: 0 0 10px var(--primary); }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: #88a0b0; }
        select, input { width: 100%; padding: 15px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 6px; color: var(--primary); font-size: 1.1rem; margin-bottom: 20px; outline: none; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 10px; }
        button { font-family: 'Orbitron', sans-serif; width: 100%; padding: 18px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; }
        .btn-calc { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #0a0e17; margin-top: 20px; box-shadow: 0 5px 20px rgba(0, 242, 254, 0.4); }
        .btn-save { background: transparent; color: #668090; border: 1px solid #334a60; margin-top: 15px; font-size: 0.85rem; }
        .result-box { margin-top: 30px; padding: 25px; border-radius: 8px; background: rgba(0, 0, 0, 0.4); border: 1px solid var(--border); border-left: 4px solid var(--primary); display: none; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .res-header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .res-lv { font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: bold; }
        .res-val { font-family: 'Orbitron', sans-serif; font-size: 2.8rem; font-weight: bold; }
        .advice-item { margin-top: 18px; }
        .advice-icon { color: var(--primary); margin-right: 10px; }
        .advice-text { font-size: 1rem; color: var(--text); line-height: 1.5; padding-left: 26px; }
    </style>
</head>
<body>

<div class="card">
    <h1>SEKISOU NAVI PRO</h1>
    
    <div class="section-title">Material Database</div>
    <select id="materialSelect" onchange="loadMaterial()">
    </select>
    <div id="newNameArea" style="display:none;">
        <label>New Material Name</label>
        <input type="text" id="newName" placeholder="e.g. SPM30, SUS420">
    </div>

    <div class="section-title">Mill Test Report (%)</div>
    <div class="grid">
        <div class="input-group"><label>C</label><input type="number" id="C" step="0.01" placeholder="0.00"></div>
        <div class="input-group"><label>Cr</label><input type="number" id="Cr" step="0.01" placeholder="0.00"></div>
        <div class="input-group"><label>Mn</label><input type="number" id="Mn" step="0.01" placeholder="0.00"></div>
        <div class="input-group"><label>Mo</label><input type="number" id="Mo" step="0.01" placeholder="0.00"></div>
        <div class="input-group"><label>Si</label><input type="number" id="Si" step="0.01" placeholder="0.00"></div>
        <div class="input-group"><label>V</label><input type="number" id="V" step="0.01" placeholder="0.00"></div>
    </div>
    
    <button class="btn-calc" onclick="calculate()">Analysis Start</button>
    <button class="btn-save" onclick="saveMaterial()">Save to Database</button>

    <div id="result" class="result-box">
        <div class="res-header">
            <div id="resLv" class="res-lv">LEVEL --</div>
            <div id="ceqVal" class="res-val">0.00</div>
            <div style="font-size: 0.75rem; color: #668090; margin-top:8px;">Carbon Equivalent (Ceq)</div>
        </div>
        <div class="advice-item">
            <div class="advice-title"><span class="advice-icon">🌡️</span> 予熱温度 (Preheat)</div>
            <div id="preheat" class="advice-text">---</div>
        </div>
        <div class="advice-item">
            <div class="advice-title"><span class="advice-icon">🔥</span> 後熱・保持 (Post-heat)</div>
            <div id="postheat" class="advice-text">---</div>
        </div>
        <div class="advice-item">
            <div class="advice-title"><span class="advice-icon">❄️</span> 冷却速度 (Cooling Rate)</div>
            <div id="coolspeed" class="advice-text">---</div>
        </div>
    </div>
</div>

<script>
    const defaultData = {
        skd11: { name: "SKD11 (Standard)", c: 1.5, cr: 12.0, mn: 0.4, mo: 1.0, si: 0.3, v: 0.3 },
        dc53: { name: "DC53 (SKD11改良)", c: 0.55, cr: 5.5, mn: 0.35, mo: 1.25, si: 0.35, v: 0.2 },
        skd61: { name: "SKD61 (Standard)", c: 0.4, cr: 5.0, mn: 0.4, mo: 1.2, si: 1.0, v: 1.0 },
        nak55: { name: "NAK55 (金型材)", c: 0.15, cr: 1.0, mn: 1.5, mo: 0.3, si: 0.3, v: 0 },
        sus420j2: { name: "SUS420J2", c: 0.33, cr: 13.0, mn: 0.5, mo: 0, si: 0.5, v: 0 },
        sus440c: { name: "SUS440C", c: 1.08, cr: 17.0, mn: 0.5, mo: 0.4, si: 0.5, v: 0 },
        sus304: { name: "SUS304", c: 0.08, cr: 18.0, mn: 2.0, mo: 0, si: 1.0, v: 0 },
        sus316l: { name: "SUS316L", c: 0.03, cr: 16.0, mn: 2.0, mo: 2.0, si: 1.0, v: 0 },
        scm440: { name: "SCM440 (クロモリ)", c: 0.41, cr: 1.05, mn: 0.75, mo: 0.23, si: 0.25, v: 0 },
        sncm439: { name: "SNCM439 (ニッケルクロモリ)", c: 0.41, cr: 0.8, mn: 0.75, mo: 0.23, si: 0.25, v: 0 },
        inco718: { name: "Inconel 718", c: 0.08, cr: 19.0, mn: 0.35, mo: 3.0, si: 0.35, v: 0 },
        inco625: { name: "Inconel 625", c: 0.1, cr: 21.5, mn: 0.5, mo: 9.0, si: 0.5, v: 0 },
        stellite6: { name: "Stellite 6 (Co基)", c: 1.1, cr: 28.5, mn: 0.5, mo: 0, si: 1.2, v: 0 },
        s45c: { name: "S45C", c: 0.45, cr: 0, mn: 0.6, mo: 0, si: 0.2, v: 0 },
        fc300: { name: "FC300 (参考)", c: 3.0, cr: 0, mn: 0.8, mo: 0, si: 2.0, v: 0 },
        ss400: { name: "SS400", c: 0.15, cr: 0, mn: 0.6, mo: 0, si: 0.1, v: 0 }
    };

    let materials = JSON.parse(localStorage.getItem('myMaterials')) || defaultData;

    function init() {
        const select = document.getElementById('materialSelect');
        select.innerHTML = '';
        for (let key in materials) {
            let opt = document.createElement('option');
            opt.value = key;
            opt.innerText = materials[key].name;
            select.appendChild(opt);
        }
        let optNew = document.createElement('option');
        optNew.value = 'new';
        optNew.innerText = '＋ 新規追加';
        select.appendChild(optNew);
        loadMaterial();
    }

    function loadMaterial() {
        const sel = document.getElementById('materialSelect').value;
        const area = document.getElementById('newNameArea');
        if (sel === 'new') {
            area.style.display = 'block';
            ['C','Cr','Mn','Mo','Si','V'].forEach(id => document.getElementById(id).value = '');
        } else {
            area.style.display = 'none';
            const data = materials[sel];
            document.getElementById('C').value = data.c;
            document.getElementById('Cr').value = data.cr;
            document.getElementById('Mn').value = data.mn;
            document.getElementById('Mo').value = data.mo;
            document.getElementById('Si').value = data.si;
            document.getElementById('V').value = data.v;
        }
    }

    function saveMaterial() {
        const sel = document.getElementById('materialSelect').value;
        let name = (sel === 'new') ? document.getElementById('newName').value : prompt("名称を変更しますか？", materials[sel].name);
        if (!name) { alert("名称を入力してください。"); return; }
        const key = 'user_' + Date.now();
        materials[key] = {
            name: name,
            c: parseFloat(document.getElementById('C').value) || 0,
            cr: parseFloat(document.getElementById('Cr').value) || 0,
            mn: parseFloat(document.getElementById('Mn').value) || 0,
            mo: parseFloat(document.getElementById('Mo').value) || 0,
            si: parseFloat(document.getElementById('Si').value) || 0,
            v: parseFloat(document.getElementById('V').value) || 0
        };
        localStorage.setItem('myMaterials', JSON.stringify(materials));
        init();
        document.getElementById('materialSelect').value = key;
        alert("保存されました。");
    }

    function calculate() {
        const c = parseFloat(document.getElementById('C').value) || 0;
        const cr = parseFloat(document.getElementById('Cr').value) || 0;
        const mn = parseFloat(document.getElementById('Mn').value) || 0;
        const mo = parseFloat(document.getElementById('Mo').value) || 0;
        const si = parseFloat(document.getElementById('Si').value) || 0;
        const v = parseFloat(document.getElementById('V').value) || 0;
        const ceq = c + (mn/6) + (si/24) + (cr/5) + (mo/4) + (v/14);
        
        let pre, post, cool, lv, color;
        if (ceq <= 0.30) { lv="LV.1"; color="#2ecc71"; pre="常温〜50℃"; post="不要"; cool="放冷"; }
        else if (ceq <= 0.45) { lv="LV.2"; color="#82e0aa"; pre="50〜100℃"; post="不要"; cool="放冷"; }
        else if (ceq <= 0.60) { lv="LV.3"; color="#f1c40f"; pre="100〜150℃"; post="保温"; cool="風除け徐冷"; }
        else if (ceq <= 0.80) { lv="LV.4"; color="#f39c12"; pre="150〜200℃"; post="150℃ 20分"; cool="10分/20℃減"; }
        else if (ceq <= 1.20) { lv="LV.5"; color="#e67e22"; pre="200〜250℃"; post="200℃ 30分"; cool="10分/15℃減"; }
        else if (ceq <= 2.00) { lv="LV.6"; color="#d35400"; pre="250〜300℃"; post="250℃ 60分"; cool="10分/10℃減"; }
        else if (ceq <= 3.00) { lv="LV.7"; color="#c0392b"; pre="300〜350℃"; post="300℃保持"; cool="10分/8℃減"; }
        else if (ceq <= 4.00) { lv="LV.8"; color="#922b21"; pre="350〜400℃"; post="炉内保持推奨"; cool="10分/5℃減"; }
        else if (ceq <= 5.00) { lv="LV.9"; color="#641e16"; pre="400℃以上維持"; post="即熱処理炉へ"; cool="10分/3℃減"; }
        else { lv="LV.10"; color="#1b2631"; pre="専門設備必須"; post="数時間保持"; cool="自動制御推奨"; }

        const resBox = document.getElementById('result');
        resBox.style.display = 'block';
        resBox.style.borderLeftColor = color;
        document.getElementById('resLv').innerText = lv;
        document.getElementById('resLv').style.color = color;
        document.getElementById('ceqVal').innerText = ceq.toFixed(2);
        document.getElementById('ceqVal').style.color = color;
        document.getElementById('preheat').innerText = pre;
        document.getElementById('postheat').innerText = post;
        document.getElementById('coolspeed').innerText = cool;
        setTimeout(() => { window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); }, 100);
    }
    init();
</script>
</body>
</html>
