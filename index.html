<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEKISOU NAVI PRO v5</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--primary:#00f2fe;
--danger:#ff4d4d;
--warn:#ffcf00;
--safe:#2ecc71;
--bg:#0a0e17;
--card:rgba(20,30,48,0.9);
--border:#1a2a44;
--text:#e0f7fa;
}

body{
font-family:Arial;
background:var(--bg);
color:var(--text);
padding:20px;
display:flex;
justify-content:center;
}

.card{
max-width:520px;
width:100%;
background:var(--card);
padding:25px;
border-radius:10px;
border:1px solid var(--border);
}

h1{
text-align:center;
color:var(--primary);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

input,select{
width:100%;
padding:10px;
background:black;
border:1px solid var(--border);
color:var(--primary);
}

button{
width:100%;
padding:15px;
margin-top:10px;
font-weight:bold;
background:var(--primary);
border:none;
cursor:pointer;
}

.result{
margin-top:20px;
padding:15px;
border:1px solid var(--border);
}

.stat{
font-size:20px;
font-weight:bold;
}

canvas{
margin-top:20px;
}

/* smartphone */

@media(max-width:600px){

.grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="card">

<h1>CRACK ANALYSIS MASTER v5</h1>

<select id="material">
<option value="skd11">SKD11</option>
<option value="dc53">DC53</option>
<option value="skd61">SKD61</option>
<option value="scm440">SCM440</option>
<option value="s45c">S45C</option>
<option value="sus304">SUS304</option>
</select>

<div class="grid">

<div><label>C</label><input id="C" type="number"></div>
<div><label>Cr</label><input id="Cr" type="number"></div>
<div><label>Mn</label><input id="Mn" type="number"></div>
<div><label>Mo</label><input id="Mo" type="number"></div>
<div><label>Si</label><input id="Si" type="number"></div>
<div><label>Ni</label><input id="Ni" type="number"></div>

</div>

<label>Heat Input (kJ/mm)</label>
<input id="heat" value="5">

<label>Base Metal</label>
<input id="base" value="80">

<label>Powder</label>
<input id="powder" value="20">

<button onclick="calculate()">Analyze</button>

<div class="result">

<div>Risk Level</div>
<div class="stat" id="risk"></div>

<div>Ceq</div>
<div class="stat" id="ceq"></div>

<div>Ms Point</div>
<div class="stat" id="ms"></div>

<div>Preheat Temp</div>
<div class="stat" id="preheat"></div>

<div>Cooling Rate</div>
<div class="stat" id="cooling"></div>

<div>Structure</div>
<div class="stat" id="structure"></div>

<div>Dilution</div>
<div class="stat" id="dilution"></div>

<canvas id="chart"></canvas>

</div>

</div>

<script>

function calcCeq(c,mn,cr,mo,si,v){

return c + mn/6 + (cr+mo+v)/5 + si/24;

}

function calcMs(c,mn,cr,ni,mo){

return 539 - 423*c - 30.4*mn - 12.1*cr - 17.7*ni - 7.5*mo;

}

function calcPreheat(ceq){

let t=350*(ceq-0.25);

if(t<25) t=25;

return Math.round(t);

}

function coolingRate(heat){

return (800/heat).toFixed(1);

}

function structure(ms){

if(ms>350) return "Martensite";
if(ms>200) return "Bainite";
if(ms>100) return "Mixed";
return "Austenite";

}

function dilution(base,powder){

let d=base/(base+powder);

return (d*100).toFixed(1)+"%";

}

function riskLevel(ceq){

if(ceq>0.8) return "CRITICAL";
if(ceq>0.45) return "HIGH";
return "SAFE";

}

function calculate(){

let c=parseFloat(C.value)||0;
let cr=parseFloat(Cr.value)||0;
let mn=parseFloat(Mn.value)||0;
let mo=parseFloat(Mo.value)||0;
let si=parseFloat(Si.value)||0;
let ni=parseFloat(Ni.value)||0;

let heat=parseFloat(heat.value);
let base=parseFloat(base.value);
let powder=parseFloat(powder.value);

let ceq=calcCeq(c,mn,cr,mo,si,0);
let ms=calcMs(c,mn,cr,ni,mo);
let preheat=calcPreheat(ceq);
let cool=coolingRate(heat);
let str=structure(ms);
let dil=dilution(base,powder);
let risk=riskLevel(ceq);

ceq=ceq.toFixed(2);
ms=Math.round(ms);

document.getElementById("risk").innerText=risk;
document.getElementById("ceq").innerText=ceq;
document.getElementById("ms").innerText=ms+" ℃";
document.getElementById("preheat").innerText=preheat+" ℃";
document.getElementById("cooling").innerText=cool+" ℃/s";
document.getElementById("structure").innerText=str;
document.getElementById("dilution").innerText=dil;

drawChart(ceq,ms,preheat,cool);

}

function drawChart(ceq,ms,preheat,cooling){

const ctx=document.getElementById("chart");

new Chart(ctx,{

type:"bar",

data:{
labels:["Ceq","Ms","Preheat","Cooling"],
datasets:[{
data:[ceq,ms,preheat,cooling],
backgroundColor:["#00f2fe","#2ecc71","#ffcf00","#ff4d4d"]
}]
},

options:{
plugins:{legend:{display:false}}
}

});

}

</script>

</body>
</html>
